<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta (overridden per-page by react-helmet-async) -->
    <title>CertReady — Red Seal Exam Prep for Canadian Trades</title>
    <meta name="description" content="Comprehensive exam preparation courses for Canadian Red Seal trades certification candidates. Practice questions, study guides, and mock exams." />
    <meta name="keywords" content="Red Seal, Canadian trades, exam prep, certification, practice questions, study guide, mock exam, CertReady" />
    <meta name="theme-color" content="#0B1120" />

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: load only what is needed, use display=swap to prevent FOIT -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Preload critical font weight -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/dmsans/v14/rP2Hp2ywxg089UriASitCBimCw.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Favicon: .ico for Google/crawlers; 48x48 PNG for search result icon; SVG for modern browsers -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon-48.png" />

    <!-- Canonical base (overridden per-page) -->
    <link rel="canonical" href="https://www.certready.ca/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
