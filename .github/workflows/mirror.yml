name: Mirror to Vercel Repo

on:
  push:
    branches:
      - main   

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror push
        run: |
           git push --mirror https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/0933322888/certready-client.git

      - name: Push to Repo C
        run: |
          git remote add mirror-c https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/0933322888/certready-api.git
          git push mirror-c main --force
